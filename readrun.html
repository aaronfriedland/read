<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ReadRun</title>
<!-- PDF.js for PDF text extraction -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- JSZip for ePub (zip) unpacking -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0f0f0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  user-select: none;
}
canvas {
  display: block; background: #f7f7f7; border-radius: 4px;
  width: 100%; aspect-ratio: 800 / 280;
}
#wrap { position: relative; width: min(800px, 100vw - 16px); }

/* ── Overlay modal ── */
#overlay {
  position: fixed; inset: 0; display: flex;
  align-items: center; justify-content: center;
  background: rgba(240,240,240,0.92); z-index: 10;
}
#overlay.hidden { display: none; }
#modal {
  background: #fff; border: 2px solid #ccc; border-radius: 8px;
  padding: 28px 32px; max-width: 460px; width: 90%;
  text-align: center; font-family: 'Courier New', monospace; color: #333;
}
#modal-title { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
#modal-text  { font-size: 13px; line-height: 1.8; color: #555; margin-bottom: 18px; white-space: pre-line; }
.choices { display: flex; flex-direction: column; gap: 8px; text-align: left; }
.choice {
  background: #f7f7f7; border: 1px solid #ccc; border-radius: 4px;
  padding: 9px 14px; cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 13px; color: #333; transition: all .12s;
}
.choice:hover { border-color: #555; background: #eee; }
.choice.correct { border-color: #16a34a; background: #dcfce7; color: #166534; pointer-events: none; }
.choice.wrong   { border-color: #dc2626; background: #fee2e2; color: #991b1b; pointer-events: none; }
.choice.disabled { pointer-events: none; opacity: 0.4; }
#continue-btn {
  margin-top: 16px; background: #333; border: none; color: #fff;
  padding: 10px 28px; border-radius: 4px; cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 14px; display: none;
}
#continue-btn:hover { background: #555; }

/* ── Upload button in start modal ── */
#upload-row {
  display: flex; gap: 10px; justify-content: center;
  align-items: center; margin-bottom: 14px;
}
#upload-btn {
  background: #f0f0f0; border: 1px solid #bbb; border-radius: 4px;
  padding: 8px 16px; cursor: pointer; font-family: 'Courier New', monospace;
  font-size: 13px; color: #444; transition: all .12s; display: inline-block;
}
#upload-btn:hover, #upload-btn:active { background: #e0e0e0; border-color: #888; }
#upload-label {
  font-size: 12px; color: #888; font-family: 'Courier New', monospace;
}
/* visually hidden but accessible — label click triggers file picker on iOS */
#file-input {
  position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none;
}
#loading-msg { font-size: 13px; color: #666; display: none; margin-bottom: 14px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="canvas" width="800" height="280"></canvas>
</div>

<div id="overlay">
  <div id="modal">
    <div id="modal-title">ReadRun</div>
    <p id="modal-text"></p>
    <div id="upload-row" style="display:none">
      <label id="upload-btn" for="file-input">📂 Load PDF / ePub / txt</label>
      <span id="upload-label">or play with Moby Dick below</span>
    </div>
    <p id="loading-msg">⏳ Reading your file…</p>
    <input type="file" id="file-input" accept=".pdf,.epub,.txt,text/plain,application/epub+zip,application/pdf">
    <div class="choices" id="choices"></div>
    <button id="continue-btn">Continue →</button>
  </div>
</div>

<script>
// ─── PDF.js worker ────────────────────────────────────────────────────────────
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const W = 800, H = 280;
const GROUND_Y     = 200;
const FONT_SIZE    = 21;
const FONT         = `${FONT_SIZE}px 'Courier New', monospace`;
const CHAR_X       = 130;
const CHAR_W       = 44;
const CHAR_H_STAND = 58;
const CHAR_H_DUCK  = 28;
const BASE_SPEED   = 145;
const GRAVITY      = 820;
const JUMP_VY      = -490;
const GAP_BIG = 85;
const GAP_MED = 48;
const BAR_BEAM_Y = GROUND_Y - CHAR_H_DUCK - 8;  // 164
const BAR_BEAM_H = 8;
const BAR_W      = 52;

// ─── DEFAULT TEXT + QUESTIONS ─────────────────────────────────────────────────
const DEFAULT_TEXT = `Call me Ishmael. Some years ago—never mind how long precisely—having little money in my purse, and nothing particular to interest me on shore, I thought I would sail about a little and see the watery part of the world. It is a way I have of driving off the spleen and regulating the circulation. Whenever I find myself growing grim about the mouth; whenever it is a damp, drizzly November in my soul; whenever I find myself involuntarily pausing before coffin warehouses, and bringing up the rear of every funeral I meet; and especially whenever my hypos get such an upper hand of me, that it requires a strong moral principle to prevent me from deliberately stepping into the street, and methodically knocking people's hats off—then, I account it high time to get to sea as soon as I can. This is my substitute for pistol and ball. With a philosophical flourish Cato throws himself upon his sword; I quietly take to the ship. There is nothing surprising in this. If they only knew it, almost all men in their degree, some time or other, cherish very nearly the same feelings towards the ocean as I do.`;

const DEFAULT_QUESTIONS = [
  { q:"What is the narrator's name?",
    choices:["Ahab","Ishmael","Queequeg","Starbuck"], answer:1 },
  { q:"Why does Ishmael go to sea?",
    choices:["Hired as a sailor","To drive off the spleen and see the world","Lost his money","Running from trouble"], answer:1 },
  { q:"What season does Ishmael feel in his soul when low?",
    choices:["A bitter winter","A stormy summer","A damp, drizzly November","A grey spring"], answer:2 },
  { q:"What does Ishmael feel like doing when his 'hypos' get the upper hand?",
    choices:["Swimming far out","Methodically knocking people's hats off","Starting a fight","Running away"], answer:1 },
  { q:"Going to sea is a substitute for what?",
    choices:["A long journey","Pistol and ball","Medicine and rest","Bread and water"], answer:1 },
  { q:"Who throws himself upon his sword with 'a philosophical flourish'?",
    choices:["Ahab","Ishmael","Cato","Starbuck"], answer:2 },
];

// Generic questions used when a custom text is loaded
const GENERIC_QUESTIONS = [
  { q:"What were you just reading about?", choices:["Paying attention!","Daydreaming…","Both","Neither"], answer:0 },
  { q:"Can you recall the last word before you fell?", choices:["Yes!","Sort of","Not really","No…"], answer:0 },
  { q:"Did the last sentence make sense to you?", choices:["Yes, fully","Mostly","Not quite","Not at all"], answer:0 },
];

let activeText      = DEFAULT_TEXT;
let activeQuestions = DEFAULT_QUESTIONS;
let customTitle     = '';

// ─── FILE LOADING ─────────────────────────────────────────────────────────────
async function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  document.getElementById('loading-msg').style.display = 'block';
  try {
    let text = '';
    if (ext === 'txt') {
      text = await file.text();
    } else if (ext === 'pdf') {
      text = await extractPDF(file);
    } else if (ext === 'epub') {
      text = await extractEPub(file);
    } else {
      alert('Unsupported file type. Use .pdf, .epub, or .txt');
      return;
    }
    text = cleanText(text);
    if (text.length < 100) { alert('Could not extract enough text from this file.'); return; }
    activeText      = text;
    activeQuestions = GENERIC_QUESTIONS;
    customTitle     = file.name.replace(/\.[^.]+$/, '');
    document.getElementById('upload-label').textContent = `✓ ${customTitle}`;
    document.getElementById('upload-label').style.color = '#16a34a';
  } catch (err) {
    console.error(err);
    alert('Error reading file: ' + err.message);
  } finally {
    document.getElementById('loading-msg').style.display = 'none';
  }
}

async function extractPDF(file) {
  const buf  = await file.arrayBuffer();
  const pdf  = await pdfjsLib.getDocument({ data: buf }).promise;
  let out = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page    = await pdf.getPage(i);
    const content = await page.getTextContent();
    out += content.items.map(it => it.str).join(' ') + ' ';
  }
  return out;
}

async function extractEPub(file) {
  const zip = await JSZip.loadAsync(file);

  // Locate content.opf via container.xml
  let opfPath = '';
  const containerFile = zip.file('META-INF/container.xml');
  if (containerFile) {
    const xml   = await containerFile.async('text');
    const match = xml.match(/full-path="([^"]+\.opf)"/i);
    if (match) opfPath = match[1];
  }
  if (!opfPath) {
    // Fallback: find any .opf
    zip.forEach((p) => { if (!opfPath && p.endsWith('.opf')) opfPath = p; });
  }

  let spineFiles = [];
  if (opfPath) {
    const base   = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/') + 1) : '';
    const opfXml = await zip.file(opfPath).async('text');

    // Build id→href manifest
    const manifest = {};
    for (const m of opfXml.matchAll(/<item\s[^>]*id="([^"]+)"[^>]*href="([^"]+)"/gi))
      manifest[m[1]] = base + m[2];

    // Spine order
    for (const m of opfXml.matchAll(/<itemref\s[^>]*idref="([^"]+)"/gi)) {
      const href = manifest[m[1]];
      if (href) spineFiles.push(href);
    }
  }

  // Fallback: all xhtml/html files
  if (!spineFiles.length) {
    zip.forEach((p) => { if (/\.(xhtml|html)$/i.test(p)) spineFiles.push(p); });
    spineFiles.sort();
  }

  let out = '';
  for (const path of spineFiles) {
    const f = zip.file(path) || zip.file(decodeURIComponent(path));
    if (!f) continue;
    const html = await f.async('text');
    out += htmlStrip(html) + ' ';
  }
  return out;
}

function htmlStrip(html) {
  return html
    .replace(/<style[\s\S]*?<\/style>/gi, '')
    .replace(/<script[\s\S]*?<\/script>/gi, '')
    .replace(/<[^>]+>/g, ' ')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'")
    .replace(/\s+/g,' ').trim();
}

function cleanText(t) {
  return t.replace(/[\r\n\t]+/g, ' ').replace(/\s{2,}/g, ' ').trim();
}

// ─── TILE BUILDER ─────────────────────────────────────────────────────────────
function tokenize(raw) {
  const segs = []; let buf = '';
  for (const ch of raw) {
    if ('.!?'.includes(ch)) {
      if (buf) { segs.push({ k:'word', t:buf }); buf=''; }
      segs.push({ k:'gap_big' });
    } else if (',;:'.includes(ch)) {
      if (buf) { segs.push({ k:'word', t:buf }); buf=''; }
      segs.push({ k:'gap_med' });
    } else if (ch==='-'||ch==='\u2014') {
      if (buf) { segs.push({ k:'word', t:buf }); buf=''; }
      segs.push({ k:'bar' });
    } else { buf+=ch; }
  }
  if (buf) segs.push({ k:'word', t:buf });
  return segs;
}

function buildTiles(ctx, text) {
  ctx.font = FONT;
  const tiles = [];
  const spW = ctx.measureText(' ').width;
  let x = CHAR_X;
  for (const raw of text.split(/\s+/).filter(Boolean)) {
    for (const seg of tokenize(raw)) {
      if (seg.k==='word') {
        const tw = Math.ceil(ctx.measureText(seg.t).width) + Math.ceil(spW);
        tiles.push({ type:'word', x, w:tw, text:seg.t });
        x += tw;
      } else if (seg.k==='gap_big') {
        tiles.push({ type:'gap', x, w:GAP_BIG, size:'big' }); x += GAP_BIG;
      } else if (seg.k==='gap_med') {
        tiles.push({ type:'gap', x, w:GAP_MED, size:'med' }); x += GAP_MED;
      } else if (seg.k==='bar') {
        tiles.push({ type:'bar', x, w:BAR_W }); x += BAR_W;
      }
    }
  }
  x += 50;
  const et = 'THE  END';
  const ew = Math.ceil(ctx.measureText(et).width) + Math.ceil(spW);
  tiles.push({ type:'word', x, w:ew, text:et, isEnd:true });
  tiles.push({ type:'end-marker', x:x+ew+10, w:1 });
  return tiles;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let canvas, ctx, tiles = [];
let gameState = 'idle';   // idle | countdown | playing | paused | user-paused | dead | win
let speed = 1, lives = 5, qIdx = 0, score = 0;
let lastTS = null, animId = null;
let cdVal = 3, cdTimer = 1.0;
let totalWidth = 1;

const char = {
  y: GROUND_Y - CHAR_H_STAND,
  vy: 0, ducking: false, invincible: 0,
};
const charH   = () => char.ducking ? CHAR_H_DUCK : CHAR_H_STAND;
const charTop = () => char.y;
const charBot = () => char.y + charH();
const onGnd   = () => charBot() >= GROUND_Y - 2;

// ─── INPUT ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') {
    e.preventDefault();
    if (gameState==='idle')        { startCountdown(); return; }
    if (gameState==='user-paused') { togglePause(); return; }
    if (gameState==='playing' && onGnd() && !char.ducking) char.vy = JUMP_VY;
  }
  if (e.code==='ArrowDown') {
    e.preventDefault();
    if (gameState==='playing') char.ducking = true;
  }
  if (e.code==='KeyP') {
    if (gameState==='playing' || gameState==='user-paused') togglePause();
  }
});
window.addEventListener('keyup', e => {
  if (e.code==='ArrowDown') char.ducking = false;
});

// ─── TOUCH CONTROLS ───────────────────────────────────────────────────────────
// Tap top 2/3 of canvas = jump   |   tap/hold bottom 1/3 = duck
let touchDucking = false;

canvas_touchStart = function(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.changedTouches[0];
  const ty = (touch.clientY - rect.top) * (H / rect.height);
  const isBottomThird = ty > H * 0.67;

  if (gameState === 'idle')        { startCountdown(); return; }
  if (gameState === 'user-paused') { togglePause(); return; }
  if (gameState === 'playing') {
    if (isBottomThird) {
      char.ducking = true;
      touchDucking = true;
    } else if (onGnd() && !char.ducking) {
      char.vy = JUMP_VY;
    }
  }
};

canvas_touchEnd = function(e) {
  e.preventDefault();
  if (touchDucking) { char.ducking = false; touchDucking = false; }
};

function togglePause() {
  gameState = gameState==='user-paused' ? 'playing' : 'user-paused';
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update(dt) {
  if (gameState==='countdown') {
    cdTimer -= dt;
    if (cdTimer<=0) { cdVal--; cdTimer=1.0; if (cdVal<0) gameState='playing'; }
    return;
  }
  if (gameState !== 'playing') return;

  if (char.invincible > 0) char.invincible -= dt;

  const dx = BASE_SPEED * speed * dt;
  for (const t of tiles) t.x -= dx;
  score += dx;

  char.vy += GRAVITY * dt;
  char.y  += char.vy * dt;

  const cx = CHAR_X + CHAR_W / 2;
  let gnd = false;
  for (const t of tiles) {
    if (t.type==='word' && cx>=t.x && cx<=t.x+t.w) { gnd=true; break; }
  }
  if (gnd && char.vy>=0 && charBot()>=GROUND_Y) {
    char.y = GROUND_Y - charH(); char.vy = 0;
  }

  if (char.invincible <= 0) {
    for (const t of tiles) {
      if (t.type==='bar') {
        const xo = CHAR_X+6 < t.x+t.w && CHAR_X+CHAR_W-6 > t.x;
        if (xo && charTop()<BAR_BEAM_Y && charBot()>BAR_BEAM_Y) { die(); return; }
      }
    }
  }

  if (char.invincible<=0 && char.y>H+60) { die(); return; }

  for (const t of tiles) {
    if (t.type==='end-marker' && t.x<CHAR_X) {
      gameState='win';
      const title = customTitle ? `"${customTitle}"` : 'the passage';
      showModal('You finished!', `You read all of ${title}.\nWell done!`, [], null, 'Play Again →', resetGame);
      return;
    }
  }
}

// ─── DIE ──────────────────────────────────────────────────────────────────────
function die() {
  if (char.invincible>0) return;
  lives--;
  char.y=GROUND_Y-CHAR_H_STAND; char.vy=0; char.ducking=false; char.invincible=2.5;
  if (lives<=0) {
    gameState='dead';
    showModal('Game Over','No more lives.',[],null,'Try Again →',resetGame);
    return;
  }
  gameState='paused';
  showQuestion(activeQuestions[qIdx % activeQuestions.length]);
  qIdx++;
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle='#f7f7f7';
  ctx.fillRect(0,0,W,H);

  // Ground line under words
  ctx.fillStyle='#999';
  for (const t of tiles) {
    if (t.type==='word' && t.x<W && t.x+t.w>0)
      ctx.fillRect(t.x, GROUND_Y+2, t.w, 2);
  }
  ctx.fillRect(0, GROUND_Y+2, CHAR_X, 2);

  ctx.font=FONT;
  for (const t of tiles) {
    if (t.x+t.w<-10||t.x>W+10) continue;
    drawTile(t);
  }

  const flash = char.invincible>0 && Math.floor(char.invincible*10)%2===0;
  if (!flash) drawMario(CHAR_X, char.y);

  drawHUD();

  // Progress bar
  const em = tiles.find(t=>t.type==='end-marker');
  if (em && gameState!=='idle') {
    const prog = Math.max(0,Math.min(1,1-(em.x-CHAR_X)/totalWidth));
    ctx.fillStyle='#ddd'; ctx.fillRect(0,H-4,W,4);
    ctx.fillStyle='#888'; ctx.fillRect(0,H-4,W*prog,4);
  }

  // Countdown
  if (gameState==='countdown') {
    ctx.fillStyle='rgba(247,247,247,0.7)';
    ctx.fillRect(0,0,W,H);
    const label = cdVal>0 ? String(cdVal) : 'GO!';
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold 100px 'Courier New', monospace`;
    ctx.fillStyle='#444';
    ctx.fillText(label, W/2, H/2-10);
    ctx.restore();
    ctx.font=FONT;
  }

  // Pause overlay
  if (gameState==='user-paused') {
    ctx.fillStyle='rgba(247,247,247,0.82)';
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold 36px 'Courier New', monospace`;
    ctx.fillStyle='#444';
    ctx.fillText('PAUSED', W/2, H/2-18);
    ctx.font=`14px 'Courier New', monospace`;
    ctx.fillStyle='#888';
    ctx.fillText('press P or SPACE to resume', W/2, H/2+18);
    ctx.restore();
    ctx.font=FONT;
  }
}

function drawTile(t) {
  if (t.type==='word') {
    ctx.fillStyle = t.isEnd ? '#16a34a' : '#333';
    ctx.textBaseline='alphabetic';
    ctx.fillText(t.text, t.x, GROUND_Y);

  } else if (t.type==='gap') {
    ctx.fillStyle = t.size==='big' ? '#bbb' : '#ccc';
    ctx.fillRect(t.x, GROUND_Y+2, t.w, 20);
    ctx.fillStyle='#aaa';
    ctx.fillRect(t.x, GROUND_Y+2, 3, 8);
    ctx.fillRect(t.x+t.w-3, GROUND_Y+2, 3, 8);
    ctx.fillStyle = t.size==='big' ? '#999' : '#bbb';
    ctx.font='bold 10px Courier New';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(t.size==='big'?'JUMP':'hop', t.x+t.w/2, GROUND_Y-4);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.font=FONT;

  } else if (t.type==='bar') {
    ctx.fillStyle='#666';
    ctx.fillRect(t.x, BAR_BEAM_Y+BAR_BEAM_H, 6, GROUND_Y-BAR_BEAM_Y-BAR_BEAM_H);
    ctx.fillRect(t.x+BAR_W-6, BAR_BEAM_Y+BAR_BEAM_H, 6, GROUND_Y-BAR_BEAM_Y-BAR_BEAM_H);
    ctx.fillStyle='#555';
    ctx.fillRect(t.x, BAR_BEAM_Y, BAR_W, BAR_BEAM_H);
    ctx.fillStyle='#888';
    ctx.font='bold 9px Courier New';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('DUCK', t.x+BAR_W/2, BAR_BEAM_Y-4);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.font=FONT;
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD() {
  // Speed buttons
  const speeds=[0.5,1,1.5,2], labels=['0.5×','1×','1.5×','2×'];
  ctx.font='11px Courier New'; ctx.textBaseline='top';
  let sx=10;
  speeds.forEach((s,i)=>{
    const bw=34,bh=18;
    ctx.fillStyle=speed===s?'#555':'#ccc';
    ctx.fillRect(sx,8,bw,bh);
    ctx.fillStyle=speed===s?'#fff':'#666';
    ctx.textAlign='center';
    ctx.fillText(labels[i],sx+bw/2,12);
    sx+=bw+4;
  });

  // Pause button (top right area, next to lives)
  const pw=28, ph=18, px=W-pw-10;
  ctx.fillStyle = gameState==='user-paused' ? '#555' : '#ccc';
  ctx.fillRect(px, 8, pw, ph);
  ctx.fillStyle = gameState==='user-paused' ? '#fff' : '#666';
  ctx.textAlign='center';
  ctx.fillText(gameState==='user-paused'?'▶':'⏸', px+pw/2, 12);

  // Lives
  const heartsStr = Array.from({length:5},(_,i)=>i<lives?'♥':'♡').join(' ');
  ctx.font='bold 14px Courier New'; ctx.fillStyle='#555';
  ctx.textAlign='right';
  ctx.fillText(heartsStr, W-44, 12);

  // Score
  const scoreStr = String(Math.floor(score/10)).padStart(5,'0');
  ctx.font='12px Courier New'; ctx.fillStyle='#888';
  ctx.fillText(scoreStr, W-44, 30);

  // Custom title (if loaded)
  if (customTitle) {
    ctx.font='10px Courier New'; ctx.fillStyle='#aaa';
    ctx.textAlign='center';
    ctx.fillText(customTitle.slice(0,40), W/2, H-14);
  }

  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ─── MARIO ────────────────────────────────────────────────────────────────────
function drawMario(bx, by) {
  const ducking=char.ducking, oH=ducking?28:56;
  ctx.save();
  ctx.translate(bx,by);
  ctx.scale(CHAR_W/30, charH()/oH);
  if (ducking) {
    ctx.fillStyle='#CC2200'; ctx.fillRect(3,0,24,8); ctx.fillRect(-1,8,32,3);
    ctx.fillStyle='#6B3318'; ctx.fillRect(-1,8,6,2); ctx.fillRect(25,8,6,2);
    ctx.fillStyle='#FFAA77'; ctx.fillRect(3,11,24,8);
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(7,14,4,2); ctx.fillRect(18,14,4,2);
    ctx.fillStyle='#6B3318'; ctx.fillRect(4,19,22,3);
    ctx.fillStyle='#1A4DB8'; ctx.fillRect(0,22,30,7);
    ctx.fillStyle='#CC2200'; ctx.fillRect(0,22,5,7); ctx.fillRect(25,22,5,7);
  } else {
    ctx.fillStyle='#CC2200'; ctx.fillRect(4,0,22,11); ctx.fillRect(-2,11,34,4);
    ctx.fillStyle='#6B3318'; ctx.fillRect(-2,11,7,3); ctx.fillRect(25,11,7,3);
    ctx.fillStyle='#FFAA77'; ctx.fillRect(3,15,24,12);
    ctx.fillStyle='#fff'; ctx.fillRect(5,17,6,5); ctx.fillRect(19,17,6,5);
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(7,18,4,4); ctx.fillRect(21,18,4,4);
    ctx.fillStyle='#cc7744'; ctx.fillRect(13,23,5,4);
    ctx.fillStyle='#6B3318'; ctx.fillRect(4,27,22,4);
    ctx.fillStyle='#CC2200'; ctx.fillRect(0,31,30,10);
    ctx.fillStyle='#1A4DB8'; ctx.fillRect(9,31,12,8);
    ctx.fillStyle='#FFD700'; ctx.fillRect(11,35,3,3); ctx.fillRect(17,35,3,3);
    const sw=Math.sin(Date.now()/105)>0;
    ctx.fillStyle='#1A4DB8';
    const lh=onGnd()?(sw?13:8):8, rh=onGnd()?(sw?8:13):8;
    ctx.fillRect(2,41,12,lh); ctx.fillRect(16,41,12,rh);
    ctx.fillStyle='#6B3318';
    ctx.fillRect(1,41+lh,13,5); ctx.fillRect(15,41+rh,13,5);
  }
  ctx.restore();
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!lastTS) lastTS=ts;
  const dt=Math.min((ts-lastTS)/1000,0.05);
  lastTS=ts;
  update(dt); draw();
  animId=requestAnimationFrame(loop);
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────
function showModal(title,text,_c,_cb,btnLabel,onBtn) {
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-text').textContent=text;
  document.getElementById('choices').innerHTML='';
  document.getElementById('upload-row').style.display='none';
  const cb=document.getElementById('continue-btn');
  cb.style.display=onBtn?'inline-block':'none';
  cb.textContent=btnLabel||'Continue →'; cb.onclick=onBtn;
  document.getElementById('overlay').classList.remove('hidden');
}

function showStartModal() {
  document.getElementById('modal-title').textContent='ReadRun';
  document.getElementById('modal-text').textContent=
    'Run across the words.\n\nSPACE / ↑  →  jump over gaps  ( .  !  ? )\n↓  →  duck under bars  ( —  - )\nP  →  pause / resume\n\n5 lives · answer a question each time you fall';
  document.getElementById('choices').innerHTML='';
  document.getElementById('upload-row').style.display='flex';
  const cb=document.getElementById('continue-btn');
  cb.style.display='inline-block';
  cb.textContent='Start →'; cb.onclick=startCountdown;
  document.getElementById('overlay').classList.remove('hidden');
}

function showQuestion(q) {
  document.getElementById('modal-title').textContent='Quick question!';
  document.getElementById('modal-text').textContent=q.q;
  document.getElementById('upload-row').style.display='none';
  const el=document.getElementById('choices');
  el.innerHTML=''; let picked=false;
  q.choices.forEach((text,i)=>{
    const b=document.createElement('button');
    b.className='choice'; b.textContent=text;
    b.addEventListener('click',()=>{
      if(picked) return; picked=true;
      el.querySelectorAll('.choice').forEach((bb,j)=>{
        if(j===q.answer) bb.classList.add('correct');
        else if(j===i)   bb.classList.add('wrong');
        else             bb.classList.add('disabled');
      });
      const cb=document.getElementById('continue-btn');
      cb.style.display='inline-block'; cb.textContent='Keep reading →';
      cb.onclick=()=>{
        document.getElementById('overlay').classList.add('hidden');
        gameState='playing';
      };
    });
    el.appendChild(b);
  });
  document.getElementById('continue-btn').style.display='none';
  document.getElementById('overlay').classList.remove('hidden');
}

// ─── CANVAS CLICKS (speed + pause buttons) ────────────────────────────────────
function canvasClick(e) {
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  // Speed buttons
  const speeds=[0.5,1,1.5,2], bw=34, bh=18;
  let sx=10;
  speeds.forEach(s=>{
    if(mx>=sx&&mx<=sx+bw&&my>=8&&my<=8+bh) speed=s;
    sx+=bw+4;
  });
  // Pause button
  const pw=28, ph=18, px=W-pw-10;
  if(mx>=px&&mx<=px+pw&&my>=8&&my<=8+ph) {
    if(gameState==='playing'||gameState==='user-paused') togglePause();
  }
}

// ─── START / RESET ────────────────────────────────────────────────────────────
function startCountdown() {
  document.getElementById('overlay').classList.add('hidden');
  // Rebuild tiles with current activeText
  tiles=buildTiles(ctx, activeText);
  const em=tiles.find(t=>t.type==='end-marker');
  totalWidth=em?em.x-CHAR_X:1;
  cdVal=3; cdTimer=1.0; gameState='countdown';
}

function resetGame() {
  lives=5; qIdx=0; score=0;
  char.y=GROUND_Y-CHAR_H_STAND; char.vy=0; char.ducking=false; char.invincible=0;
  tiles=buildTiles(ctx, activeText);
  const em=tiles.find(t=>t.type==='end-marker');
  totalWidth=em?em.x-CHAR_X:1;
  document.getElementById('overlay').classList.add('hidden');
  cdVal=3; cdTimer=1.0; gameState='countdown'; lastTS=null;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  canvas=document.getElementById('canvas');
  ctx=canvas.getContext('2d');
  ctx.font=FONT;

  // Initial tiles with default text
  tiles=buildTiles(ctx, DEFAULT_TEXT);
  const em=tiles.find(t=>t.type==='end-marker');
  totalWidth=em?em.x-CHAR_X:1;

  canvas.addEventListener('click', canvasClick);
  canvas.addEventListener('touchstart', canvas_touchStart, { passive: false });
  canvas.addEventListener('touchend',   canvas_touchEnd,   { passive: false });

  // File input handler
  const fileInput=document.getElementById('file-input');
  fileInput.addEventListener('change', async e=>{
    const f=e.target.files[0];
    if(f) await loadFile(f);
    fileInput.value='';
  });

  showStartModal();
  animId=requestAnimationFrame(loop);
});
</script>
